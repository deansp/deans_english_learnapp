<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Cards</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css?v=33">
</head>

<body>

<div class="container">

<header class="hero">
  <p class="eyebrow">Deans kleiner entspannter </p>
  <h1>Vokabeltrainer</h1>
  <p class="intro">Atme tief durch, lehn dich zurück und mach eine kleine Lerneinheit.</p>
</header>

<section class="stats-grid" aria-label="Lernstand">
  <div class="stat">
    <span id="totalCards">0</span>
    <small>Vokabeln</small>
  </div>
  <div class="stat">
    <span id="openCards">0</span>
    <small>noch zu lernen</small>
  </div>
  <div class="stat">
    <span id="knownCards">0</span>
    <small>kannst du bereits</small>
  </div>
</section>

<nav class="actions" aria-label="Hauptnavigation">
  <div class="brain-actions">
    <a class="btn" href="learn.html?deck=brain">Leg los</a>
    <a class="btn secondary" href="learn.html?deck=learned">Wiederholen</a>
  </div>
  <div class="brain-progress">
    <p id="brainStatus" class="brain-status">Aktiv werden 0 Vokabeln gelernt</p>
    <button class="text-link link-button" id="addBrainCards" type="button">gib mir drei mehr</button>
  </div>
  <a class="text-link" href="add.html">Füge neue Vokabeln hinzu</a>
  <a class="text-link" href="dictionary.html">Wörterbuch</a>
</nav>

</div>

<script src="js/storage.js?v=33"></script>
<script src="js/app.js?v=33"></script>
</body>
</html>
