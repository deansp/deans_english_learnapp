<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernen</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css?v=33">
</head>

<body>

<div class="container">

<div class="study-top">
  <a class="back-link study-home" href="index.html">Home</a>
  <label class="language-switch" aria-label="Vorderseite der Karte wählen">
    <span>DE</span>
    <input id="languageToggle" type="checkbox" checked>
    <span class="switch-track" aria-hidden="true"></span>
    <span>EN</span>
  </label>
</div>

<main class="study-card">
  <div class="swipe-zone" aria-live="polite">
    <div class="card-shell">
      <button id="flipCard" class="flip-card" type="button" aria-label="Karte umdrehen">
        <span class="card-face card-front">
          <span class="answer-wrap">
            <span id="word" class="word">Lade...</span>
            <span id="frontExample" class="example-sentence"></span>
          </span>
        </span>
        <span class="card-face card-back">
          <span class="answer-wrap">
            <span id="answer" class="answer"></span>
            <span id="backExample" class="example-sentence"></span>
          </span>
        </span>
      </button>
      <button id="infoButton" class="card-info-button" type="button" aria-label="Beispielsätze anzeigen" aria-expanded="false">i</button>
      <section id="infoPanel" class="example-panel" aria-label="Beispielsätze" hidden>
        <div class="example-panel-head">
          <button id="closeInfo" class="example-panel-close" type="button" aria-label="Beispielsätze schließen">×</button>
        </div>
        <div id="practiceExamples" class="practice-examples"></div>
      </section>
    </div>
  </div>
</main>

<div id="completionModal" class="completion-modal" hidden>
  <div class="completion-box">
    <p class="eyebrow">Lerneinheit geschafft</p>
    <h2>Schön, dass du das geschafft hast.</h2>
    <p>Du bist toll.</p>
    <a class="btn" href="index.html">Zur Startseite</a>
  </div>
</div>

<script src="js/storage.js?v=33"></script>
<script src="js/learn.js?v=33"></script>

</body>
</html>
