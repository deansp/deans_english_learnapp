<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neue Vokabel</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css?v=33">
</head>

<body>

<div class="container">

<header class="page-head">
  <a class="back-link" href="index.html">Home</a>
  <h1>Neue Vokabel</h1>
  <p>Speichere die englische Vokabel zusammen mit der deutschen Bedeutung.</p>
</header>

<main class="panel">
  <form id="addForm" class="form">
    <label for="eng">Englisch</label>
    <input id="eng" name="eng" placeholder="example: confident" autocomplete="off">

    <label for="ger">Deutsch</label>
    <input id="ger" name="ger" placeholder="zum Beispiel: selbstbewusst" autocomplete="off">

    <label for="englishExample">Englischer Beispielsatz</label>
    <textarea id="englishExample" name="englishExample" placeholder="example: She felt confident before the interview."></textarea>

    <label for="germanExample">Deutscher Beispielsatz</label>
    <textarea id="germanExample" name="germanExample" placeholder="zum Beispiel: Sie war vor dem Gespräch selbstbewusst."></textarea>

    <button class="btn" type="submit">Speichern</button>
    <p id="message" class="message" role="status"></p>
  </form>
</main>

<script src="js/storage.js?v=33"></script>
<script src="js/add.js?v=33"></script>

</body>
</html>
